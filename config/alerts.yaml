# =============================================================================
# 1BOX Marketing Dashboard — Alert Rules
# =============================================================================
# Each alert defines a metric to monitor, a condition, and notification config.
#
# Conditions:
#   percent_increase  — metric rose by more than <threshold>% vs compare_period
#   percent_decrease  — metric fell by more than <threshold>% vs compare_period
#   greater_than      — metric exceeds an absolute <threshold>
#   less_than         — metric is below an absolute <threshold>
#   equals            — metric exactly equals <threshold>
# =============================================================================

alerts:
  - id: cpc_spike
    name: "CPC Spike"
    description: "Average CPC increased more than 30% compared to 7-day average"
    metric: average_cpc
    level: campaign
    condition: percent_increase
    threshold: 30
    compare_period: 7d_average
    severity: high
    enabled: true
    notify:
      - type: email
        recipients:
          - marketing@1box.nl
    cooldown_hours: 4

  - id: ctr_drop
    name: "CTR Drop"
    description: "CTR dropped more than 50% compared to 7-day average"
    metric: ctr
    level: campaign
    condition: percent_decrease
    threshold: 50
    compare_period: 7d_average
    severity: high
    enabled: true
    notify:
      - type: email
        recipients:
          - marketing@1box.nl
    cooldown_hours: 4

  - id: zero_conversions
    name: "Zero Conversions"
    description: "No conversions recorded on a weekday"
    metric: conversions
    level: account
    condition: equals
    threshold: 0
    only_weekdays: true
    severity: critical
    enabled: true
    notify:
      - type: email
        recipients:
          - marketing@1box.nl
    cooldown_hours: 24

  - id: budget_alert
    name: "Budget Alert"
    description: "80% of daily budget consumed before 14:00 CET"
    metric: daily_budget_usage
    level: campaign
    condition: greater_than
    threshold: 80
    time_check: "14:00"
    severity: medium
    enabled: true
    notify:
      - type: email
        recipients:
          - marketing@1box.nl
    cooldown_hours: 24

  - id: quality_score_drop
    name: "Quality Score Drop"
    description: "Keyword quality score dropped below 5"
    metric: quality_score
    level: keyword
    condition: less_than
    threshold: 5
    severity: medium
    enabled: true
    notify:
      - type: email
        recipients:
          - marketing@1box.nl
    cooldown_hours: 48
